        body {

        .profile{
            width: 100px;
            height: 100px;

        
            border-radius: 100px;

            border: 2px solid white;

            background-image: url('엔버.png');
            background-position: center;
            background-size: cover;
        }
        .main{
            color: white;
            font-size: 20px;

            margin-top: 30px;
            margin-bottom: 10px;
        } 
        .sub{
            font-size: 14px;
            color: aliceblue;
            margin-top:0px;
            margin-bottom: 30px;
        }  
        .warp{
           
            width: 300px;
            margin: 30px auto 0px auto;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;


        }
        .warp > a {
            width: 300px;
            height: 50px;
            background-color: palevioletred;
            border-radius: 9px;

            font-size: 14px;
            font-weight: bold;
            color: #654678;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            box-shadow: 3px 3px 5px 0px black;
            margin-bottom: 10px;
        }

        .warp > a:hover{
            background-color: #f2f2f2;
            font-size: 15px;
        }
    </style>
</head>
